<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Local Brain v24</title>
  <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIiBzdHlsZT0iYmFja2dyb3VuZDojMmMzZTUwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0MCIgZmlsbD0iIzM0NDk1ZSIvPjxjaXJjbGUgY3g9IjMwIiBjeT0iNDAiIHI9IjUiIGZpbGw9IiMzNDk4ZGIiLz48Y2lyY2xlIGN4PSI3MCIgY3k9IjQwIiByPSI1IiBmaWxsPSIjMzQ5OGRiIi8+PGNpcmNsZSBjeD0iNTAiIGN5PSI3MCIgcj0iNSIgZmlsbD0iIzM0OThkYiIvPjxjaXJjbGUgY3g9IjUwIiBjeT0iMzAiIHI9IjUiIGZpbGw9IiMzNDk4ZGIiLz48cGF0aCBkPSJNMzAgNDAgTDUwIDMwIEw3MCA0MCBMNTAgNzAgWiIgc3Ryb2tlPSIjZWNmMGYxIiBzdHJva2Utd2lkdGg9IjIiIGZpbGw9Im5vbmUiLz48L3N2Zz4=">
  <meta name="theme-color" content="#2c3e50">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://accounts.google.com https://apis.google.com 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://www.googleapis.com https://accounts.google.com http://localhost:* http://127.0.0.1:*">

  <link rel="stylesheet" href="/src/styles/base.css">
  <link rel="stylesheet" href="/src/styles/sidebar.css">
  <link rel="stylesheet" href="/src/styles/editor.css">
  <link rel="stylesheet" href="/src/styles/modal.css">
  <link rel="stylesheet" href="/src/styles/ai.css">
  <link rel="stylesheet" href="/src/styles/responsive.css">

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js"></script>

  <link rel="manifest" id="my-manifest-placeholder">
</head>
<body>

<div id="cloudModal" class="modal-overlay">
  <div class="modal-box" id="cloudModalBox">
    <div class="modal-header"><h3 id="cloudModalTitle">雲端同步設定</h3><button onclick="window.toggleCloudModal(false)" aria-label="關閉" style="border:none;background:none;font-size:1.5rem;">&times;</button></div>
    <div class="modal-body">
      <div style="display:flex; border-bottom:1px solid #ddd; margin-bottom:15px;">
        <button onclick="window.switchTab('webdav')" id="tab-webdav" style="flex:1; padding:10px; background:none; border:none; border-bottom:2px solid #3498db; font-weight:bold;">WebDAV</button>
        <button onclick="window.switchTab('gdrive')" id="tab-gdrive" style="flex:1; padding:10px; background:none; border:none; color:#aaa;">Google Drive</button>
      </div>

      <div id="webdav-section">
        <div class="form-group"><label>URL:</label><input type="text" id="davUrl" placeholder="https://nextcloud.../brain.json"></div>
        <div class="form-group"><label>User:</label><input type="text" id="davUser"></div>
        <div class="form-group"><label>Pass:</label><input type="password" id="davPass"></div>
        <button class="toolbar-btn" id="davTestBtn">測試 WebDAV</button>
      </div>

      <div id="gdrive-section" style="display:none;">
        <div class="form-group"><label>Client ID:</label><input type="text" id="gClientId"></div>
        <div class="form-group"><label>API Key:</label><input type="text" id="gApiKey"></div>
        <p style="font-size:0.8rem; color:#666;">* 請在 Google Cloud Console 啟用 "Google Drive API"。</p>
        <button id="gAuthBtn" class="toolbar-btn" style="background:#4285F4; color:white;" disabled>連線 Google 帳號 (載入中...)</button>
        <button id="gSignOutBtn" class="toolbar-btn" disabled>登出</button>
        <div id="gDriveStatus" style="font-size:0.8rem; margin-top:5px; color:#e74c3c;"></div>
      </div>
    </div>
    <div class="modal-footer">
      <span id="davTestStatus" style="font-size:0.8rem;margin-right:auto;"></span>
      <button class="toolbar-btn" style="background:#2ecc71;color:white;" onclick="window.saveCloudConfig()">儲存設定</button>
    </div>
  </div>
</div>

<div id="previewModal" class="modal-overlay">
  <div class="modal-box" id="previewModalBox" style="max-width:600px;">
    <div class="modal-header"><h3 id="previewModalTitle">歷史預覽</h3><button onclick="window.closePreview()" aria-label="關閉" style="border:none;background:none;font-size:1.5rem;">&times;</button></div>
    <div class="modal-body" style="background:#f9f9f9;font-family:monospace;white-space:pre-wrap;" id="previewContent"></div>
    <div class="modal-footer">
      <button class="toolbar-btn" onclick="window.closePreview()">取消</button>
      <button class="toolbar-btn" style="background:#e74c3c;color:white;" onclick="window.confirmRestore()">還原</button>
    </div>
  </div>
</div>

<div id="overlayBackdrop"></div>

<div id="sidebar">
  <div class="sidebar-header">
    <div class="header-top">
      <h2>Local Brain v24</h2>
      <button onclick="window.toggleSidebar(false)" aria-label="關閉側邊欄" style="background:none;border:none;color:white;display:none;" id="closeSidebarBtn">✕</button>
      <div id="normalActions" style="display:flex;gap:10px;align-items:center;">
        <button id="batchBtn" aria-label="進入整理模式" style="background:none;border:1px solid #555;color:#ccc;border-radius:4px;padding:2px 8px;font-size:0.8rem;cursor:pointer;" title="整理模式">🗑️ 整理</button>
        <button id="addBtn" aria-label="新增筆記" title="新增筆記">+</button>
      </div>
      <div id="batchActions">
        <button id="cancelBatchBtn" aria-label="取消批次">取消</button>
        <button id="deleteBatchBtn" aria-label="確認刪除選取">確認刪除</button>
      </div>
    </div>

    <button id="installAppBtn" aria-label="安裝 App" style="display:none;width:100%;margin-top:10px;background:#27ae60;color:white;border:none;padding:8px;border-radius:4px;cursor:pointer;">📲 安裝 App</button>

    <div class="data-controls" style="margin-top:10px;">
      <button class="data-btn" id="exportBtn" aria-label="備份資料">⬇ 備份</button>
      <button class="data-btn" id="importBtn" aria-label="還原資料">⬆ 還原</button>
    </div>
    <div class="data-controls" style="margin-top:5px;">
      <button id="diskBtn" aria-label="連結本機檔">💾 硬碟</button>
      <button id="cloudBtn" aria-label="開啟雲端設定">☁️ 雲端</button>
      <button id="gDriveBtn" aria-label="Google Drive 同步">G</button>
    </div>
  </div>
  <div class="search-box">
    <input type="text" id="searchInput" class="search-input" placeholder="搜尋 (Ctrl+P)..." aria-label="搜尋筆記">
    <div class="search-options">
      <label><input type="radio" name="searchMode" value="AND" checked> AND</label>
      <label><input type="radio" name="searchMode" value="OR"> OR</label>
    </div>
  </div>
  <ul id="noteList" aria-label="筆記列表" role="list"></ul>
</div>

<div id="main">
  <div id="noteContainer" style="display:none;">
    <div id="mobileHeader">
      <button class="hamburger-btn" id="openSidebarBtn">☰</button>
      <span style="font-weight:bold;color:#555;">Local Brain</span>
      <button class="hamburger-btn" id="openAIBtn">🤖</button>
    </div>
    <div class="title-bar">
      <input type="text" id="noteTitle" placeholder="無標題" aria-label="筆記標題">
    </div>
    <div class="links-container">
      <div class="link-row">
        <span class="link-label">指向:</span>
        <div class="tags-wrapper" id="outboundLinks"></div>
        <div class="add-link-wrapper">
          <button class="add-link-btn" id="addLinkBtn">+ 關聯 (Ctrl+L)</button>
          <div id="linkSearchDropdown" class="link-search-dropdown">
            <input type="text" id="linkSearchInput" class="link-search-input" placeholder="搜尋...">
            <div id="linkOptionsList"></div>
          </div>
        </div>
      </div>
      <div class="link-row">
        <span class="link-label">來自:</span>
        <div class="tags-wrapper" id="inboundLinks"></div>
      </div>
    </div>
    <div class="toolbar">
      <select id="historySelect" class="history-select" aria-label="時光機歷史"><option value="-1">時光機</option></select>
      <button class="toolbar-btn delete" id="deleteBtn" aria-label="刪除當前筆記">刪除</button>
      <div style="flex:1"></div>
      <button id="editorModeBtn" class="toolbar-btn" aria-label="切換編輯或預覽" title="切換編輯/預覽">👁️ 預覽</button>
      <button id="insertFileBtn" class="toolbar-btn" aria-label="插入附件" title="插入圖片或附件">📎 插入</button>
      <input type="file" id="fileInputMarkdown" style="display:none" accept="image/*,.pdf,.txt,.md">
      <div style="width:5px"></div>
      <button id="pinBtn" class="toolbar-btn" aria-label="置頂筆記">📌 置頂</button>
      <div style="width:5px"></div>
      <button class="toolbar-btn" id="aiBtn" aria-label="開啟 AI 助手" style="background:#6c5ce7;color:white;">🤖 AI</button>
      <span id="status" role="status" aria-live="polite" style="font-size:0.75rem;color:#999;margin-left:5px;"></span>
    </div>
    <textarea id="editor" placeholder="在此輸入內容 (Ctrl+I)... 支援 Markdown 預覽與拖入附件" aria-label="筆記內容"></textarea>
    <div id="previewArea" style="display:none;" aria-label="Markdown 預覽"></div>
  </div>

  <div id="splitPanel">
    <div class="split-header">
      <span class="split-title" id="splitTitle">對照筆記</span>
      <button id="closeSplitBtn" style="border:none;background:none;font-weight:bold;cursor:pointer;">✕</button>
    </div>
    <textarea id="splitEditor" readonly></textarea>
  </div>

  <div id="emptyState">
    <p>👋 歡迎使用 Local Brain v24</p>
    <p style="font-size:0.9rem; color:#888;">Phase 1: escape 補強 + IndexedDB 遷移</p>
    <button class="toolbar-btn" id="emptyCreateBtn" style="background:#6c5ce7;color:white;padding:10px 20px;">+ 立即開始</button>
  </div>
</div>

<div id="aiSidebar" role="complementary" aria-label="AI 助手">
  <div class="ai-header"><h3>Ollama</h3><button onclick="window.toggleAISidebar()" aria-label="關閉 AI 助手" style="border:none;background:none;color:white;font-size:1.5rem;">&times;</button></div>
  <div class="ai-settings">
    <div class="setting-row"><label>Host:</label><input id="aiHost" value="http://localhost:11434"></div>
    <div class="setting-row"><label>Model:</label><input id="aiModel" value="llama3.2"></div>
  </div>
  <div class="ai-chat-area" id="aiChat"><div class="message msg-ai">助手準備就緒。</div></div>
  <div class="ai-input-area">
    <button class="toolbar-btn" id="summarizeBtn" style="width:100%;margin-bottom:5px;background:#a29bfe;color:white;">📝 摘要</button>
    <textarea id="aiPrompt" style="width:100%;height:60px;resize:none;" placeholder="輸入問題..."></textarea>
    <div class="ai-actions">
      <button id="clearChatBtn" style="background:none;border:none;color:#888;">清空</button>
      <button id="sendBtn" class="toolbar-btn" style="background:#6c5ce7;color:white;">發送</button>
    </div>
  </div>
</div>

<input type="file" id="fileInput" style="display: none;" accept="application/json">

<script type="module" src="/src/main.js"></script>
</body>
</html>
